mutation {
    registerBlocks(request:{
        labware:[
            {
                labwareType:"proviasette",
                medium:"None",
                fixative:"None",
                externalBarcode: "XBC1"
                samples: {
                    donorIdentifier:"DONOR1",
                    species: "Homo sapiens (Human)",
                    externalIdentifier:"TISSUE1",
                    lifeStage:adult,
                    hmdmc:"20/0002",
                    spatialLocation:0,
                    tissueType:"Bone",
                    replicateNumber:"1",
                    highestSection:0,
                    sampleCollectionDate: "2021-02-03",
                    bioRiskCode: "biorisk1",
                    cellClass: "Tissue"
                    addresses: ["A1"]
                }
            }
        ]
        workNumbers: ["SGP1"]
    }) {
        labware {
            barcode
            slots {
                samples {
                    id
                    tissue {
                        externalName
                        donor {
                            species { name }
                        }
                        collectionDate
                    }
                }
            }
        }
        clashes {
            tissue { externalName }
            labware { barcode }
        }
    }
}