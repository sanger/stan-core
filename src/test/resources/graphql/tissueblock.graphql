mutation {
    performTissueBlock(request: {
        discardSourceBarcodes: ["BARCODE"]
        workNumber: "WORKNUMBER"
        labware: [{
            numRows: 2
            numColumns: 3
            labwareType: "Proviasette"
            contents: [
                {
                    sourceBarcode: "BARCODE"
                    replicate: "5c"
                    addresses: ["A1", "B3"]
                    sourceSampleId: 999
                }
            ]
        }]
    }) {
        labware {
            numRows
            numColumns
            barcode
        }
        operations {
            id
        }
    }
}
